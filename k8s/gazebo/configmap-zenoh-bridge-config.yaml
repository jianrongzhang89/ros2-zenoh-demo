apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-bridge-config
  namespace: ros2-zenoh-gazebo
data:
  bridge.json5: |
    {
      // Bridge runs as a Zenoh client, routing all DDS traffic through
      // the central zenoh-router via TCP. Multicast scouting is disabled
      // because DDS stays on localhost (co-location pattern) and Zenoh
      // peer discovery uses TCP to the router Service instead.
      mode: "client",
      connect: {
        endpoints: ["tcp/zenoh-router:7447"]
      },
      scouting: {
        multicast: { enabled: false }
      },
      transport: {
        shared_memory: { enabled: false }
      }
    }
