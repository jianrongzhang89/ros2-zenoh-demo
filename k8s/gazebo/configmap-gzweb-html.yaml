apiVersion: v1
kind: ConfigMap
metadata:
  name: gzweb-html
  namespace: ros2-zenoh-gazebo
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Gazebo Web Visualization</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #f5f5f5; color: #333; min-height: 100vh;
          display: flex; align-items: center; justify-content: center;
        }
        .card {
          background: white; border-radius: 8px; padding: 48px;
          max-width: 680px; width: 100%; margin: 24px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .logo { font-size: 13px; font-weight: 600; color: #cc0000;
                letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 32px; font-size: 15px; }
        .label { font-size: 12px; font-weight: 600; text-transform: uppercase;
                 letter-spacing: 0.06em; color: #888; margin-bottom: 8px; }
        .ws-row {
          display: flex; align-items: stretch; gap: 0;
          margin-bottom: 28px; border: 1px solid #e0e0e0; border-radius: 6px;
          overflow: hidden;
        }
        .ws-url {
          font-family: 'SF Mono', 'Fira Code', monospace;
          background: #f4f4f4; padding: 14px 16px;
          font-size: 13px; word-break: break-all; color: #111;
          flex: 1;
        }
        .copy-btn {
          background: #333; color: white; border: none; padding: 0 20px;
          font-size: 13px; font-weight: 600; cursor: pointer;
          white-space: nowrap; transition: background 0.15s;
        }
        .copy-btn:hover { background: #000; }
        .copy-btn.copied { background: #2a7d2a; }
        .btn {
          display: inline-block; padding: 14px 28px; background: #cc0000;
          color: white; text-decoration: none; border-radius: 6px;
          font-weight: 600; font-size: 15px; transition: background 0.15s;
        }
        .btn:hover { background: #a80000; }
        .divider { border: none; border-top: 1px solid #eee;
                   margin: 32px 0; }
        .note { font-size: 13px; color: #666; line-height: 1.6; }
        .note code {
          font-family: 'SF Mono', 'Fira Code', monospace;
          background: #f4f4f4; padding: 2px 6px; border-radius: 3px;
          font-size: 12px; color: #c7254e;
        }
        .manual { margin-top: 16px; }
        .manual ol { padding-left: 20px; }
        .manual li { margin-bottom: 8px; }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="logo">ROS 2 + Zenoh + Gazebo on OpenShift</div>
        <h1>Web Visualization</h1>
        <p class="subtitle">
          A diff-drive robot simulation is running. Click the button to open
          it in your browser using GzWeb.
        </p>

        <div class="label">Step 1 — Copy the WebSocket URL</div>
        <div class="ws-row">
          <div class="ws-url" id="ws-url">Detecting…</div>
          <button class="copy-btn" id="copy-btn" onclick="copyUrl()">Copy</button>
        </div>

        <div class="label">Step 2 — Open GzWeb and paste it</div>
        <a class="btn" id="gzweb-link" href="https://app.gazebosim.org/visualization"
           target="_blank" rel="noopener">
          Open GzWeb ↗
        </a>
        <p style="margin-top:12px; font-size:13px; color:#666;">
          In GzWeb, clear the WebSocket URL field, paste the URL above, leave
          Authorization Key empty, and click <strong>Connect</strong>.
        </p>

        <hr class="divider">

        <div class="note">
          <strong>How it works:</strong>
          <a href="https://app.gazebosim.org/visualization" target="_blank">app.gazebosim.org/visualization</a>
          renders the 3D simulation in your browser via WebGL.
          GzWeb connects to the Gazebo WebSocket server running in the cluster
          and streams scene, pose and state updates in real time.
          <div class="manual">
            <p><strong>To drive the robot</strong> from the cluster:</p>
            <ol>
              <li>Get a shell: <code>kubectl exec -n ros2-zenoh-gazebo deploy/gazebo-sim -c ros-gz-bridge -- bash</code></li>
              <li>Source ROS: <code>source /opt/ros/jazzy/setup.bash</code></li>
              <li>Publish a command:
                <code>ros2 topic pub --once /cmd_vel geometry_msgs/msg/Twist
                  "{linear: {x: 0.5}, angular: {z: 0.3}}"</code>
              </li>
            </ol>
          </div>
        </div>
      </div>

      <script>
        // Route hostnames follow the pattern:
        //   gzweb-<namespace>.<apps-domain>
        //   gazebo-ws-<namespace>.<apps-domain>
        var pageHost = window.location.hostname;
        var wsHost = pageHost.replace(/^gzweb-/, 'gazebo-ws-');
        var wsUrl = 'wss://' + wsHost;
        document.getElementById('ws-url').textContent = wsUrl;

        function copyUrl() {
          navigator.clipboard.writeText(wsUrl).then(function() {
            var btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 2000);
          });
        }
      </script>
    </body>
    </html>
