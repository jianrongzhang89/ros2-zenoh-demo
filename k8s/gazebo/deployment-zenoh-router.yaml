apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenoh-router
  namespace: ros2-zenoh-gazebo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zenoh-router
  template:
    metadata:
      labels:
        app: zenoh-router
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: zenoh-router
          image: docker.io/eclipse/zenoh:latest
          ports:
            - containerPort: 7447
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 7447
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 7447
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
