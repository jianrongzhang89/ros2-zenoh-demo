apiVersion: v1
kind: ConfigMap
metadata:
  name: gz-bridge-config
  namespace: ros2-zenoh-gazebo
data:
  bridge.yaml: |
    # ros_gz_bridge parameter_bridge topic mapping
    # direction: GZ_TO_ROS | ROS_TO_GZ | BIDIRECTIONAL
    #
    # Odometry: Gazebo DiffDrive plugin → ROS 2 nav_msgs/Odometry
    - ros_topic_name: /odom
      gz_topic_name: /odom
      ros_type_name: nav_msgs/msg/Odometry
      gz_type_name: gz.msgs.Odometry
      direction: GZ_TO_ROS

    # Velocity command: ROS 2 geometry_msgs/Twist → Gazebo DiffDrive plugin
    - ros_topic_name: /cmd_vel
      gz_topic_name: /cmd_vel
      ros_type_name: geometry_msgs/msg/Twist
      gz_type_name: gz.msgs.Twist
      direction: ROS_TO_GZ

    # TF: Gazebo DiffDrive plugin odom→base_link transform → ROS 2 tf2
    - ros_topic_name: /tf
      gz_topic_name: /tf2
      ros_type_name: tf2_msgs/msg/TFMessage
      gz_type_name: gz.msgs.Pose_V
      direction: GZ_TO_ROS

    # Simulation clock: keeps ROS 2 use_sim_time nodes in sync
    - ros_topic_name: /clock
      gz_topic_name: /clock
      ros_type_name: rosgraph_msgs/msg/Clock
      gz_type_name: gz.msgs.Clock
      direction: GZ_TO_ROS
