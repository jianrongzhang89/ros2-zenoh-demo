apiVersion: v1
kind: ConfigMap
metadata:
  name: robot-model
  namespace: ros2-zenoh-gazebo
data:
  diff_drive.sdf: |
    <?xml version="1.0" ?>
    <sdf version="1.9">
      <world name="diff_drive_world">

        <physics name="1ms" type="ignored">
          <max_step_size>0.001</max_step_size>
          <real_time_factor>1.0</real_time_factor>
        </physics>

        <plugin filename="gz-sim-physics-system"
                name="gz::sim::systems::Physics"/>
        <plugin filename="gz-sim-scene-broadcaster-system"
                name="gz::sim::systems::SceneBroadcaster"/>
        <!-- Sensors system is required even for CPU-based ray sensors -->
        <plugin filename="gz-sim-sensors-system"
                name="gz::sim::systems::Sensors">
          <render_engine>ogre2</render_engine>
        </plugin>

        <light name="sun" type="directional">
          <cast_shadows>true</cast_shadows>
          <pose>0 0 10 0 0 0</pose>
          <diffuse>0.8 0.8 0.8 1</diffuse>
          <specular>0.2 0.2 0.2 1</specular>
          <direction>-0.5 0.1 -0.9</direction>
        </light>

        <model name="ground_plane">
          <static>true</static>
          <link name="link">
            <collision name="collision">
              <geometry><plane><normal>0 0 1</normal></plane></geometry>
            </collision>
          </link>
        </model>

        <model name="diff_drive_robot">
          <pose>0 0 0.2 0 0 0</pose>

          <link name="base_link">
            <inertial>
              <mass>1.0</mass>
              <inertia>
                <ixx>0.083</ixx><ixy>0</ixy><ixz>0</ixz>
                <iyy>0.083</iyy><iyz>0</iyz><izz>0.083</izz>
              </inertia>
            </inertial>
            <visual name="chassis_visual">
              <geometry><box><size>0.4 0.2 0.1</size></box></geometry>
              <material>
                <ambient>0.1 0.4 0.9 1</ambient>
                <diffuse>0.1 0.4 0.9 1</diffuse>
              </material>
            </visual>
            <collision name="chassis_collision">
              <geometry><box><size>0.4 0.2 0.1</size></box></geometry>
            </collision>
          </link>

          <link name="left_wheel">
            <pose relative_to="base_link">0.0 0.15 -0.1 -1.5707963 0 0</pose>
            <inertial>
              <mass>0.5</mass>
              <inertia>
                <ixx>0.01</ixx><ixy>0</ixy><ixz>0</ixz>
                <iyy>0.01</iyy><iyz>0</iyz><izz>0.01</izz>
              </inertia>
            </inertial>
            <visual name="visual">
              <geometry><cylinder><radius>0.1</radius><length>0.05</length></cylinder></geometry>
              <material><ambient>0.2 0.2 0.2 1</ambient><diffuse>0.2 0.2 0.2 1</diffuse></material>
            </visual>
            <collision name="collision">
              <geometry><cylinder><radius>0.1</radius><length>0.05</length></cylinder></geometry>
            </collision>
          </link>

          <link name="right_wheel">
            <pose relative_to="base_link">0.0 -0.15 -0.1 -1.5707963 0 0</pose>
            <inertial>
              <mass>0.5</mass>
              <inertia>
                <ixx>0.01</ixx><ixy>0</ixy><ixz>0</ixz>
                <iyy>0.01</iyy><iyz>0</iyz><izz>0.01</izz>
              </inertia>
            </inertial>
            <visual name="visual">
              <geometry><cylinder><radius>0.1</radius><length>0.05</length></cylinder></geometry>
              <material><ambient>0.2 0.2 0.2 1</ambient><diffuse>0.2 0.2 0.2 1</diffuse></material>
            </visual>
            <collision name="collision">
              <geometry><cylinder><radius>0.1</radius><length>0.05</length></cylinder></geometry>
            </collision>
          </link>

          <joint name="left_wheel_joint" type="revolute">
            <parent>base_link</parent>
            <child>left_wheel</child>
            <axis>
              <xyz expressed_in="__model__">0 1 0</xyz>
              <limit>
                <lower>-1.79769e+308</lower>
                <upper>1.79769e+308</upper>
              </limit>
            </axis>
          </joint>

          <joint name="right_wheel_joint" type="revolute">
            <parent>base_link</parent>
            <child>right_wheel</child>
            <axis>
              <xyz expressed_in="__model__">0 1 0</xyz>
              <limit>
                <lower>-1.79769e+308</lower>
                <upper>1.79769e+308</upper>
              </limit>
            </axis>
          </joint>

          <plugin filename="gz-sim-diff-drive-system"
                  name="gz::sim::systems::DiffDrive">
            <left_joint>left_wheel_joint</left_joint>
            <right_joint>right_wheel_joint</right_joint>
            <wheel_separation>0.3</wheel_separation>
            <wheel_radius>0.1</wheel_radius>
            <odom_publish_frequency>20</odom_publish_frequency>
            <!-- gz-transport topic names (mapped to ROS by ros_gz_bridge) -->
            <topic>/cmd_vel</topic>
            <odom_topic>/odom</odom_topic>
            <tf_topic>/tf2</tf_topic>
            <frame_id>odom</frame_id>
            <child_frame_id>base_link</child_frame_id>
          </plugin>
        </model>

      </world>
    </sdf>
