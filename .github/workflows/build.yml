name: Build and Push to Quay.io

on:
  push:
    branches: [main, zeno-dds-bridge, ros2-zenoh-dds-simulator]
  pull_request:
    branches: [main]

env:
  IMAGE:        quay.io/jianrzha/ros2-zenoh-demo
  GAZEBO_IMAGE: quay.io/jianrzha/ros2-zenoh-gazebo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ros2
          platforms: linux/arm64,linux/amd64
          push: false

      - name: Build and push (main branch)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ros2
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Mirror zenoh images to Quay.io
        if: github.event_name == 'push'
        run: |
          skopeo copy --multi-arch all \
            --dest-creds "${{ secrets.QUAY_USERNAME }}:${{ secrets.QUAY_PASSWORD }}" \
            docker://docker.io/eclipse/zenoh-bridge-ros2dds:latest \
            docker://quay.io/jianrzha/zenoh-bridge-ros2dds:latest
          skopeo copy --multi-arch all \
            --dest-creds "${{ secrets.QUAY_USERNAME }}:${{ secrets.QUAY_PASSWORD }}" \
            docker://docker.io/eclipse/zenoh:latest \
            docker://quay.io/jianrzha/zenoh-router:latest

  build-gazebo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build Gazebo image (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gazebo
          platforms: linux/arm64,linux/amd64
          push: false

      - name: Build and push Gazebo image (main branch)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gazebo
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ${{ env.GAZEBO_IMAGE }}:latest
            ${{ env.GAZEBO_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.GAZEBO_IMAGE }}:latest
          cache-to: type=inline
