apiVersion: v1
kind: ConfigMap
metadata:
  name: gz-websocket-config
  namespace: ros2-zenoh-gazebo
data:
  websocket.gzlaunch: |
    <?xml version="1.0"?>
    <gz version="1.0">
      <!-- WebSocket bridge: subscribes to all Gazebo Transport topics in
           the simulation and re-publishes them as WebSocket messages on
           port 9002. GzWeb (browser) connects here to render the world.
           Runs in the same pod as gz sim -s so gz-transport discovery
           works on the shared pod network namespace (no GZ_RELAY needed). -->
      <plugin name="gz::launch::WebsocketServer"
              filename="gz-launch-websocket-server">
        <port>9002</port>
            <publication_hz>30</publication_hz>
        <!-- -1 = unlimited; set a positive number to cap concurrent browsers -->
        <max_connections>-1</max_connections>
      </plugin>
    </gz>
