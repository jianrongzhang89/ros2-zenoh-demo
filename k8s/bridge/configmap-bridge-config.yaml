apiVersion: v1
kind: ConfigMap
metadata:
  name: bridge-zenoh-config
  namespace: ros2-zenoh-bridge
data:
  bridge.json5: |
    {
      // Bridge runs as a Zenoh client, routing all DDS traffic through
      // the central zenoh-bridge-router instead of using DDS multicast.
      mode: "client",
      connect: {
        endpoints: ["tcp/zenoh-bridge-router:7447"]
      },
      scouting: {
        multicast: { enabled: false }
      }
    }
